<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Dynamic Slide System</title>
    <link rel="stylesheet" href="/dist/main.css" />
    <script type="module" src="/dist/main.js" defer></script>
    <style>
      #drop-zone {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #202124;
        color: #e8eaed;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 4px dashed #3c4043;
        margin: 0;
        box-sizing: border-box;
        z-index: 9999;
        font-family: sans-serif;
        transition:
          background-color 0.2s,
          border-color 0.2s;
      }
      #drop-zone.dragover {
        background: #2d2f34;
        border-color: #8ab4f8;
      }
      .drop-message {
        text-align: center;
        pointer-events: none;
      }
      .drop-message h3 {
        font-size: 24px;
        margin-bottom: 8px;
      }
      .drop-message p {
        color: #9aa0a6;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="drop-zone">
      <div class="drop-message">
        <h3>Markdownファイルをここにドロップ</h3>
        <p>file:// プロトコルによる完全スタンドアロン動作に対応しています</p>
      </div>
    </div>
  </body>
</html>
